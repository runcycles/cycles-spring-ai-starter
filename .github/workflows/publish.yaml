name: Publish to Maven Central

on:
  workflow_dispatch:
  release:
    types: [created]

permissions: read-all

jobs:
  test-release-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
      CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
      GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          server-id: central
          server-username: CENTRAL_USERNAME
          server-password: CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Verify pom version is not SNAPSHOT
        working-directory: cycles-spring-ai-starter
        # Sonatype Central rejects SNAPSHOT publishes server-side, but we'd rather
        # fail fast on the runner than wait for the deploy step. Tracked org-wide
        # at runcycles/.github#61.
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          if [[ "$VERSION" == *SNAPSHOT* ]]; then
            echo "::error::Cannot publish SNAPSHOT version: $VERSION. Drop -SNAPSHOT in the pom before tagging."
            exit 1
          fi
          echo "Publishing version: $VERSION"

      - name: Test release build without publishing
        working-directory: cycles-spring-ai-starter
        run: mvn -B -Prelease clean verify

  publish:
    if: github.event_name == 'release'
    needs: test-release-build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
      CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
      GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          server-id: central
          server-username: CENTRAL_USERNAME
          server-password: CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Verify pom version is not SNAPSHOT
        working-directory: cycles-spring-ai-starter
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          if [[ "$VERSION" == *SNAPSHOT* ]]; then
            echo "::error::Cannot publish SNAPSHOT version: $VERSION. Drop -SNAPSHOT in the pom before tagging."
            exit 1
          fi
          echo "Publishing version: $VERSION"

      - name: Publish
        working-directory: cycles-spring-ai-starter
        run: mvn -B -Prelease clean deploy
