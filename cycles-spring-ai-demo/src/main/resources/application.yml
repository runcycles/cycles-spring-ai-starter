spring:
  application:
    name: cycles-spring-ai-demo
  ai:
    openai:
      # Set OPENAI_API_KEY in your env, or override here for local testing.
      api-key: ${OPENAI_API_KEY:demo-key-not-set}

# Cycles configuration. The `cycles.*` connection/subject keys are bound by
# the underlying cycles-client-java-spring SDK; the nested `cycles.spring-ai.*`
# keys are bound by this starter (cycles-spring-ai-starter).
cycles:
  # Required by cycles-client-java-spring auto-configuration.
  base-url: ${CYCLES_BASE_URL:http://localhost:7878}
  api-key:  ${CYCLES_API_KEY:demo-api-key-not-set}

  # Subject defaults applied to every Cycles call from this app.
  tenant:    demo-tenant
  workspace: demo
  app:       cycles-spring-ai-demo

  # Spring AI starter properties (this repo).
  spring-ai:
    enabled: true
    default-estimate: 1000
    estimate-unit: USD_MICROCENTS
    action-kind: llm.chat
    action-name: spring-ai-demo
    # Local demo: tolerate Cycles server being absent so context boots cleanly.
    fail-open: true
